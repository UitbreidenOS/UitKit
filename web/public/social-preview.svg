<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="'Arial Black', 'Arial', sans-serif">

  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a0a00"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Orange border frame -->
  <rect x="0" y="0" width="1280" height="640" fill="none" stroke="#f97316" stroke-width="6"/>

  <!-- Top-left corner accent squares -->
  <rect x="24" y="24" width="20" height="20" fill="#f97316"/>
  <rect x="50" y="24" width="20" height="20" fill="#f97316" opacity="0.5"/>
  <rect x="24" y="50" width="20" height="20" fill="#f97316" opacity="0.5"/>

  <!-- Top-right corner accent squares -->
  <rect x="1236" y="24" width="20" height="20" fill="#f97316"/>
  <rect x="1210" y="24" width="20" height="20" fill="#f97316" opacity="0.5"/>
  <rect x="1236" y="50" width="20" height="20" fill="#f97316" opacity="0.5"/>

  <!-- Bottom-left corner -->
  <rect x="24" y="596" width="20" height="20" fill="#f97316"/>
  <rect x="50" y="596" width="20" height="20" fill="#f97316" opacity="0.5"/>
  <rect x="24" y="570" width="20" height="20" fill="#f97316" opacity="0.5"/>

  <!-- Bottom-right corner -->
  <rect x="1236" y="596" width="20" height="20" fill="#f97316"/>
  <rect x="1210" y="596" width="20" height="20" fill="#f97316" opacity="0.5"/>
  <rect x="1236" y="570" width="20" height="20" fill="#f97316" opacity="0.5"/>

  <!-- Main title — large and bold -->
  <text x="640" y="170" text-anchor="middle" font-size="128" font-weight="900" fill="white" letter-spacing="-4">CLAUDIENT</text>

  <!-- Orange underline accent -->
  <rect x="200" y="185" width="880" height="5" fill="url(#accent)" rx="3"/>

  <!-- Tagline -->
  <text x="640" y="235" text-anchor="middle" font-size="24" font-weight="700" fill="#fb923c" letter-spacing="1">The Claude Code Knowledge System</text>

  <!-- Subtitle -->
  <text x="640" y="272" text-anchor="middle" font-size="18" font-weight="400" fill="#9ca3af">160+ Skills · 25 Agents · 15 Categories · FR DE NL ES</text>

  <!-- Category pills — row 1 -->
  <g font-size="13" font-weight="800">
    <!-- small-business -->
    <rect x="86" y="302" width="138" height="28" rx="4" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1"/>
    <text x="155" y="321" text-anchor="middle" fill="#f97316">small-business</text>

    <!-- backend -->
    <rect x="234" y="302" width="88" height="28" rx="4" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1"/>
    <text x="278" y="321" text-anchor="middle" fill="#3b82f6">backend</text>

    <!-- devops-infra -->
    <rect x="332" y="302" width="118" height="28" rx="4" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1"/>
    <text x="391" y="321" text-anchor="middle" fill="#f97316">devops-infra</text>

    <!-- ai-engineering -->
    <rect x="460" y="302" width="148" height="28" rx="4" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-width="1"/>
    <text x="534" y="321" text-anchor="middle" fill="#a855f7">ai-engineering</text>

    <!-- gtm -->
    <rect x="618" y="302" width="66" height="28" rx="4" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1"/>
    <text x="651" y="321" text-anchor="middle" fill="#06b6d4">gtm</text>

    <!-- marketing -->
    <rect x="694" y="302" width="100" height="28" rx="4" fill="#f43f5e" opacity="0.15" stroke="#f43f5e" stroke-width="1"/>
    <text x="744" y="321" text-anchor="middle" fill="#f43f5e">marketing</text>

    <!-- product -->
    <rect x="804" y="302" width="84" height="28" rx="4" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1"/>
    <text x="846" y="321" text-anchor="middle" fill="#8b5cf6">product</text>

    <!-- finance -->
    <rect x="898" y="302" width="84" height="28" rx="4" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1"/>
    <text x="940" y="321" text-anchor="middle" fill="#10b981">finance</text>

    <!-- legal -->
    <rect x="992" y="302" width="70" height="28" rx="4" fill="#64748b" opacity="0.15" stroke="#64748b" stroke-width="1"/>
    <text x="1027" y="321" text-anchor="middle" fill="#64748b">legal</text>

    <!-- productivity -->
    <rect x="1072" y="302" width="104" height="28" rx="4" fill="#14b8a6" opacity="0.15" stroke="#14b8a6" stroke-width="1"/>
    <text x="1124" y="321" text-anchor="middle" fill="#14b8a6">productivity</text>
  </g>

  <!-- Command line block -->
  <rect x="280" y="348" width="720" height="52" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="310" y="364" font-size="14" fill="#6b7280" font-family="monospace">$</text>
  <text x="326" y="364" font-size="14" fill="#f97316" font-family="monospace" font-weight="700">npx claudient add all</text>
  <text x="310" y="387" font-size="12" fill="#6b7280" font-family="monospace">Installing 160+ skills, 25 agents, hooks, rules, guides...</text>

  <!-- Stats row -->
  <g font-weight="900" fill="white" font-size="32">
    <!-- 160+ Skills -->
    <rect x="86" y="420" width="220" height="80" rx="6" fill="#111827" stroke="#f97316" stroke-width="1.5"/>
    <text x="196" y="455" text-anchor="middle" font-size="36" fill="#f97316">160+</text>
    <text x="196" y="482" text-anchor="middle" font-size="15" font-weight="700" fill="#9ca3af">Skills</text>

    <!-- 25 Agents -->
    <rect x="326" y="420" width="200" height="80" rx="6" fill="#111827" stroke="#ec4899" stroke-width="1.5"/>
    <text x="426" y="455" text-anchor="middle" font-size="36" fill="#ec4899">25</text>
    <text x="426" y="482" text-anchor="middle" font-size="15" font-weight="700" fill="#9ca3af">Agents</text>

    <!-- 11 Hooks -->
    <rect x="546" y="420" width="190" height="80" rx="6" fill="#111827" stroke="#a855f7" stroke-width="1.5"/>
    <text x="641" y="455" text-anchor="middle" font-size="36" fill="#a855f7">11</text>
    <text x="641" y="482" text-anchor="middle" font-size="15" font-weight="700" fill="#9ca3af">Hooks</text>

    <!-- 5 Languages -->
    <rect x="756" y="420" width="220" height="80" rx="6" fill="#111827" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="866" y="455" text-anchor="middle" font-size="36" fill="#06b6d4">5</text>
    <text x="866" y="482" text-anchor="middle" font-size="15" font-weight="700" fill="#9ca3af">Languages</text>

    <!-- 15 Categories -->
    <rect x="996" y="420" width="200" height="80" rx="6" fill="#111827" stroke="#10b981" stroke-width="1.5"/>
    <text x="1096" y="455" text-anchor="middle" font-size="36" fill="#10b981">15</text>
    <text x="1096" y="482" text-anchor="middle" font-size="15" font-weight="700" fill="#9ca3af">Categories</text>
  </g>

  <!-- Feature highlights row -->
  <text x="640" y="536" text-anchor="middle" font-size="14" font-weight="700" fill="#4b5563">
    AWS · Azure · GCP · GDPR · SOC2 · EU AI Act · LangGraph · RAG · Deal Desk · Hono · Vitest · Helm
  </text>

  <!-- Bottom banner -->
  <rect x="200" y="554" width="880" height="38" rx="4" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1"/>
  <text x="640" y="578" text-anchor="middle" font-size="15" font-weight="800" fill="#f97316">
    C-Suite Advisors · Role Agents · Orchestration Protocol · Multi-Language
  </text>

  <!-- Credit -->
  <text x="640" y="618" text-anchor="middle" font-size="14" font-weight="600" fill="#4b5563">
    by uitbreiden.com · github.com/Claudients/Claudient · MIT License
  </text>

</svg>
