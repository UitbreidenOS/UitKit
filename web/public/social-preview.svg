<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="'Arial Black', 'Arial', sans-serif">

  <!-- Background -->
  <rect width="1280" height="640" fill="#f97316"/>

  <!-- Black border frame -->
  <rect x="0" y="0" width="1280" height="640" fill="none" stroke="#0a0a0a" stroke-width="8"/>

  <!-- Top-left decorative blocks -->
  <rect x="40" y="40" width="28" height="28" fill="#0a0a0a"/>
  <rect x="76" y="40" width="28" height="28" fill="#0a0a0a"/>
  <rect x="40" y="76" width="28" height="28" fill="#0a0a0a"/>

  <!-- Top-right decorative blocks -->
  <rect x="1176" y="40" width="28" height="28" fill="#0a0a0a"/>
  <rect x="1212" y="40" width="28" height="28" fill="#0a0a0a"/>
  <rect x="1212" y="76" width="28" height="28" fill="#0a0a0a"/>

  <!-- Bottom-left decorative blocks -->
  <rect x="40" y="524" width="28" height="28" fill="#0a0a0a"/>
  <rect x="40" y="560" width="28" height="28" fill="#0a0a0a"/>
  <rect x="76" y="560" width="28" height="28" fill="#0a0a0a"/>

  <!-- Bottom-right decorative blocks -->
  <rect x="1176" y="560" width="28" height="28" fill="#0a0a0a"/>
  <rect x="1212" y="524" width="28" height="28" fill="#0a0a0a"/>
  <rect x="1212" y="560" width="28" height="28" fill="#0a0a0a"/>

  <!-- Main title: CLAUDIENT -->
  <text x="640" y="240" text-anchor="middle" font-size="136" font-weight="900" fill="#0a0a0a" letter-spacing="-4">CLAUDIENT</text>

  <!-- Divider line -->
  <rect x="160" y="268" width="960" height="5" fill="#0a0a0a"/>

  <!-- Subtitle -->
  <text x="640" y="330" text-anchor="middle" font-size="36" font-weight="700" fill="#0a0a0a">The Claude Code Knowledge System</text>

  <!-- npm install badge — black pill -->
  <rect x="390" y="368" width="500" height="64" fill="#0a0a0a" rx="0"/>
  <rect x="386" y="364" width="500" height="64" fill="#0a0a0a" rx="0"/>
  <text x="636" y="406" text-anchor="middle" font-size="28" font-weight="700" fill="#f97316" font-family="'Courier New', monospace">npx claudient add all</text>

  <!-- Stats row -->
  <g font-size="24" font-weight="700" fill="#0a0a0a">
    <!-- Skills -->
    <rect x="140" y="468" width="180" height="60" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <rect x="143" y="471" width="180" height="60" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <text x="233" y="507" text-anchor="middle" font-size="26" font-weight="900" fill="#0a0a0a">19 Skills</text>

    <!-- Agents -->
    <rect x="348" y="468" width="180" height="60" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <rect x="351" y="471" width="180" height="60" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <text x="441" y="507" text-anchor="middle" font-size="26" font-weight="900" fill="#0a0a0a">6 Agents</text>

    <!-- Hooks -->
    <rect x="556" y="468" width="170" height="60" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <rect x="559" y="471" width="170" height="60" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <text x="644" y="507" text-anchor="middle" font-size="26" font-weight="900" fill="#0a0a0a">7 Hooks</text>

    <!-- Languages -->
    <rect x="754" y="468" width="196" height="60" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <rect x="757" y="471" width="196" height="60" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <text x="855" y="507" text-anchor="middle" font-size="26" font-weight="900" fill="#0a0a0a">5 Languages</text>

    <!-- MIT -->
    <rect x="978" y="468" width="160" height="60" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <rect x="981" y="471" width="160" height="60" fill="white" stroke="#0a0a0a" stroke-width="3"/>
    <text x="1061" y="507" text-anchor="middle" font-size="26" font-weight="900" fill="#0a0a0a">MIT · Free</text>
  </g>

  <!-- Bottom credit -->
  <text x="640" y="592" text-anchor="middle" font-size="22" font-weight="700" fill="#0a0a0a" opacity="0.7">by uitbreiden.com · github.com/Claudient/Claudient</text>

</svg>
