<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="'Arial Black', 'Arial', sans-serif">

  <defs>
    <!-- Rich dark background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="50%" style="stop-color:#0f0a00"/>
      <stop offset="100%" style="stop-color:#130800"/>
    </linearGradient>

    <!-- Orange gradient for accents -->
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>

    <!-- Subtle glow for title -->
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Card glow filter -->
    <filter id="cardglow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#f97316" stroke-width="0.3" opacity="0.06">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Orange radial glow behind title -->
  <ellipse cx="640" cy="160" rx="420" ry="90" fill="#f97316" opacity="0.05"/>

  <!-- Border — hairline orange -->
  <rect x="1" y="1" width="1278" height="638" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>

  <!-- Corner accents — top left -->
  <rect x="20" y="20" width="40" height="3" fill="#f97316"/>
  <rect x="20" y="20" width="3" height="40" fill="#f97316"/>

  <!-- Corner accents — top right -->
  <rect x="1220" y="20" width="40" height="3" fill="#f97316"/>
  <rect x="1257" y="20" width="3" height="40" fill="#f97316"/>

  <!-- Corner accents — bottom left -->
  <rect x="20" y="617" width="40" height="3" fill="#f97316"/>
  <rect x="20" y="580" width="3" height="40" fill="#f97316"/>

  <!-- Corner accents — bottom right -->
  <rect x="1220" y="617" width="40" height="3" fill="#f97316"/>
  <rect x="1257" y="580" width="3" height="40" fill="#f97316"/>

  <!-- Orange glow layer for title -->
  <text x="640" y="148" text-anchor="middle" font-size="108" font-weight="900" fill="#f97316" opacity="0.15" letter-spacing="-3">CLAUDIENT</text>

  <!-- Main title -->
  <text x="640" y="148" text-anchor="middle" font-size="108" font-weight="900" fill="white" letter-spacing="-3" filter="url(#glow)">CLAUDIENT</text>

  <!-- Gradient underline -->
  <rect x="180" y="162" width="920" height="3" fill="url(#orange)" rx="2" opacity="0.9"/>

  <!-- Tagline -->
  <text x="640" y="204" text-anchor="middle" font-size="22" font-weight="700" fill="#fb923c" letter-spacing="2">THE CLAUDE CODE KNOWLEDGE BASE</text>

  <!-- Sub-tagline -->
  <text x="640" y="234" text-anchor="middle" font-size="15" font-weight="400" fill="#6b7280">256+ skills · 77+ agents · 100 MCP configs · 5 languages · MIT</text>

  <!-- Category pills row 1 -->
  <g font-size="12" font-weight="700" font-family="'Arial', sans-serif">
    <rect x="76" y="258" width="116" height="24" rx="12" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1" opacity="0.7"/>
    <text x="134" y="275" text-anchor="middle" fill="#f97316">small-business</text>

    <rect x="202" y="258" width="80" height="24" rx="12" fill="#3b82f6" opacity="0.12" stroke="#3b82f6" stroke-width="1"/>
    <text x="242" y="275" text-anchor="middle" fill="#60a5fa">backend</text>

    <rect x="292" y="258" width="104" height="24" rx="12" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1"/>
    <text x="344" y="275" text-anchor="middle" fill="#fb923c">devops-infra</text>

    <rect x="406" y="258" width="128" height="24" rx="12" fill="#a855f7" opacity="0.12" stroke="#a855f7" stroke-width="1"/>
    <text x="470" y="275" text-anchor="middle" fill="#c084fc">ai-engineering</text>

    <rect x="544" y="258" width="56" height="24" rx="12" fill="#06b6d4" opacity="0.12" stroke="#06b6d4" stroke-width="1"/>
    <text x="572" y="275" text-anchor="middle" fill="#22d3ee">gtm</text>

    <rect x="610" y="258" width="92" height="24" rx="12" fill="#f43f5e" opacity="0.12" stroke="#f43f5e" stroke-width="1"/>
    <text x="656" y="275" text-anchor="middle" fill="#fb7185">marketing</text>

    <rect x="712" y="258" width="76" height="24" rx="12" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1"/>
    <text x="750" y="275" text-anchor="middle" fill="#a78bfa">product</text>

    <rect x="798" y="258" width="76" height="24" rx="12" fill="#10b981" opacity="0.12" stroke="#10b981" stroke-width="1"/>
    <text x="836" y="275" text-anchor="middle" fill="#34d399">finance</text>

    <rect x="884" y="258" width="62" height="24" rx="12" fill="#94a3b8" opacity="0.12" stroke="#94a3b8" stroke-width="1"/>
    <text x="915" y="275" text-anchor="middle" fill="#94a3b8">legal</text>

    <rect x="956" y="258" width="96" height="24" rx="12" fill="#14b8a6" opacity="0.12" stroke="#14b8a6" stroke-width="1"/>
    <text x="1004" y="275" text-anchor="middle" fill="#2dd4bf">productivity</text>

    <rect x="1062" y="258" width="68" height="24" rx="12" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1"/>
    <text x="1096" y="275" text-anchor="middle" fill="#fbbf24">data-ml</text>

    <rect x="1140" y="258" width="70" height="24" rx="12" fill="#ec4899" opacity="0.12" stroke="#ec4899" stroke-width="1"/>
    <text x="1175" y="275" text-anchor="middle" fill="#f472b6">database</text>
  </g>

  <!-- Terminal block -->
  <rect x="200" y="298" width="880" height="58" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1.5"/>
  <!-- Terminal dots -->
  <circle cx="224" cy="314" r="5" fill="#ff5f57"/>
  <circle cx="240" cy="314" r="5" fill="#febc2e"/>
  <circle cx="256" cy="314" r="5" fill="#28c840"/>
  <line x1="272" y1="298" x2="272" y2="356" stroke="#21262d" stroke-width="1"/>
  <!-- Command -->
  <text x="288" y="324" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed">$</text>
  <text x="302" y="324" font-family="'Courier New', monospace" font-size="14" fill="#f97316" font-weight="700">npx claudient add all</text>
  <text x="288" y="344" font-family="'Courier New', monospace" font-size="12" fill="#4b5563">Installing 256+ skills, 77+ agents, hooks, MCP configs, guides...</text>

  <!-- Stat cards row -->
  <!-- 250+ Skills -->
  <rect x="76" y="372" width="186" height="88" rx="8" fill="#0d1117" stroke="#f97316" stroke-width="1.5"/>
  <text x="169" y="412" text-anchor="middle" font-size="38" font-weight="900" fill="#f97316">256+</text>
  <text x="169" y="434" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280" letter-spacing="1">SKILLS</text>
  <rect x="76" y="372" width="186" height="4" rx="2" fill="url(#orange)"/>

  <!-- 70+ Agents -->
  <rect x="276" y="372" width="186" height="88" rx="8" fill="#0d1117" stroke="#ec4899" stroke-width="1.5"/>
  <text x="369" y="412" text-anchor="middle" font-size="38" font-weight="900" fill="#ec4899">77+</text>
  <text x="369" y="434" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280" letter-spacing="1">AGENTS</text>
  <rect x="276" y="372" width="186" height="4" rx="2" fill="#ec4899"/>

  <!-- 30+ Hooks -->
  <rect x="476" y="372" width="186" height="88" rx="8" fill="#0d1117" stroke="#a855f7" stroke-width="1.5"/>
  <text x="569" y="412" text-anchor="middle" font-size="38" font-weight="900" fill="#a855f7">30+</text>
  <text x="569" y="434" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280" letter-spacing="1">HOOKS</text>
  <rect x="476" y="372" width="186" height="4" rx="2" fill="#a855f7"/>

  <!-- 100 MCP -->
  <rect x="676" y="372" width="186" height="88" rx="8" fill="#0d1117" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="769" y="412" text-anchor="middle" font-size="38" font-weight="900" fill="#06b6d4">100</text>
  <text x="769" y="434" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280" letter-spacing="1">MCP CONFIGS</text>
  <rect x="676" y="372" width="186" height="4" rx="2" fill="#06b6d4"/>

  <!-- 5 Languages -->
  <rect x="876" y="372" width="186" height="88" rx="8" fill="#0d1117" stroke="#10b981" stroke-width="1.5"/>
  <text x="969" y="412" text-anchor="middle" font-size="38" font-weight="900" fill="#10b981">5</text>
  <text x="969" y="434" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280" letter-spacing="1">LANGUAGES</text>
  <rect x="876" y="372" width="186" height="4" rx="2" fill="#10b981"/>

  <!-- 35+ Guides -->
  <rect x="1076" y="372" width="128" height="88" rx="8" fill="#0d1117" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1140" y="412" text-anchor="middle" font-size="38" font-weight="900" fill="#fbbf24">45+</text>
  <text x="1140" y="434" text-anchor="middle" font-size="13" font-weight="700" fill="#6b7280" letter-spacing="1">GUIDES</text>
  <rect x="1076" y="372" width="128" height="4" rx="2" fill="#fbbf24"/>

  <!-- Feature strip -->
  <text x="640" y="498" text-anchor="middle" font-size="13" font-weight="600" fill="#374151" letter-spacing="0.5">
    Next.js · FastAPI · Rust · Kubernetes · LangGraph · RAG · GDPR · DCF Model · HubSpot MCP · SRE · dbt · Stripe
  </text>

  <!-- Bottom banner -->
  <rect x="140" y="514" width="1000" height="42" rx="6" fill="#f97316" opacity="0.08" stroke="#f97316" stroke-width="1" opacity="0.4"/>
  <text x="640" y="540" text-anchor="middle" font-size="14" font-weight="800" fill="#fb923c" letter-spacing="0.5">
    Developers · Vibe Coders · GTM Teams · Finance · Legal · Small Business Owners
  </text>

  <!-- Footer credit -->
  <text x="640" y="580" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">
    uitbreiden.com · github.com/Claudients/Claudient · MIT License
  </text>

  <!-- Orange dot accent at footer -->
  <circle cx="572" cy="576" r="3" fill="#f97316" opacity="0.6"/>
  <circle cx="708" cy="576" r="3" fill="#f97316" opacity="0.6"/>

</svg>
