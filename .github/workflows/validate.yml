name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Lint markdown files
        run: |
          markdownlint-cli2 "**/*.md" \
            --config .markdownlint.json \
            --ignore "site/**" \
            --ignore "node_modules/**" \
            --ignore "*.lock"

  frontmatter-validation:
    name: Frontmatter & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Validate skill/agent/hook format
        run: node scripts/validate-frontmatter.js
        # TODO: Remove continue-on-error once all 106 skill files have frontmatter added
        continue-on-error: true

  link-check:
    name: Internal Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check internal links in guides
        run: |
          find guides -name "*.md" \
            -not -path "guides/fr/*" \
            -not -path "guides/de/*" \
            -not -path "guides/es/*" \
            -not -path "guides/nl/*" \
            | head -30 \
            | xargs -I{} markdown-link-check -q -c .markdown-link-check.json {} || true
        continue-on-error: true

  manifest-consistency:
    name: Manifest Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Validate manifest alignment
        run: node scripts/validate-manifests.js
        # TODO: Remove continue-on-error once plugin.json stubs are resolved
        continue-on-error: true

  freshness-check:
    name: Skill Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Check skill/agent freshness
        run: node scripts/check-freshness.js --warn-only

  stack-validation:
    name: Workspace Stacks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Validate workspace stack completeness
        run: node scripts/validate-stacks.js --warn-only
